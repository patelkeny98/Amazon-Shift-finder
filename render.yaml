services:
  - type: worker
    name: amazon-shift-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python amazon_uk_shift_bot.py
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: HEADLESS
        value: "true"
      - key: SOUND_ALERT
        value: "false"
      - key: REFRESH_SECONDS
        value: "30"
